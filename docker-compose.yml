services:
  backend:
    build: .
    container_name: luna_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db-postgres:
        condition: service_healthy
      consumer:
        condition: service_started
    restart: unless-stopped
    networks:
      - luna-network
    secrets:
      - source: credentials
        target: credentials
    stop_grace_period: 3s

  db-postgres:
    image: postgres:16
    container_name: luna_postgres
    env_file:
      - .env
    ports:
     - "5432:5432"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 60s
      retries: 5
    networks:
      - luna-network

  rabbit:
    image: rabbitmq:4.2.5-management
    container_name: luna_rabbitmq
    hostname: rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbit_data:/var/lib/rabbitmq 
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - luna-network

  consumer:
    build: .
    container_name: luna_consumer
    command: python3 ./src/consumer/main.py
    env_file:
      - .env
    depends_on:
      rabbit:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - luna-network

networks:
  luna-network:

secrets:
  credentials:
    file: ./credentials.yaml

volumes:
  postgres_data:
  rabbit_data:
